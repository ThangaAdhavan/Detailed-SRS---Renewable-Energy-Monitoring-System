# ===================================================================
# API GATEWAY - APPLICATION PROPERTIES
# ===================================================================
spring.application.name=api-gateway
server.port=8080

# ---------------- Gateway Routes ----------------
# Routes traffic on /solar/**, /wind/**, /battery/**, /distribution/**
# to the corresponding downstream microservice, stripping the leading
# path segment before forwarding to /api/... on that service.

spring.cloud.gateway.routes[0].id=solar-panel-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/solar/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/solar/(?<segment>.*), /api/solar/$\{segment}

spring.cloud.gateway.routes[1].id=wind-turbine-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/wind/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/wind/(?<segment>.*), /api/wind/$\{segment}

spring.cloud.gateway.routes[2].id=battery-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/battery/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/battery/(?<segment>.*), /api/battery/$\{segment}

spring.cloud.gateway.routes[3].id=energy-distribution-service
spring.cloud.gateway.routes[3].uri=http://localhost:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/distribution/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/distribution/(?<segment>.*), /api/distribution/$\{segment}

# ---------------- Actuator ----------------
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always

# ---------------- Logging ----------------
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
