# ===================================================================
# ENERGY DISTRIBUTION SERVICE - APPLICATION PROPERTIES
# ===================================================================
spring.application.name=energy-distribution-service
server.port=8084

# ---------------- Datasource (H2) ----------------
spring.datasource.url=jdbc:h2:file:./data/distribution_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------- H2 Console ----------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ---------------- Hibernate / JPA ----------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# ---------------- Downstream Service URLs ----------------
services.solar.base-url=http://localhost:8081
services.wind.base-url=http://localhost:8082
services.battery.base-url=http://localhost:8083

# ---------------- Business Rules ----------------
distribution.active-hours-start=6
distribution.active-hours-end=18
distribution.low-battery-threshold=20.0

# ---------------- RestTemplate Timeouts (ms) ----------------
resttemplate.connect-timeout=3000
resttemplate.read-timeout=5000

# ---------------- Swagger / OpenAPI ----------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ---------------- Actuator ----------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ---------------- Logging ----------------
logging.level.root=INFO
logging.level.com.renewable.distribution=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
